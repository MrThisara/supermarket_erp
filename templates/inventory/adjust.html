{% extends 'base.html' %}

{% block title %}Adjust Stock{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Adjust Stock — {{ item['name'] }}</h1>
    <a href="{{ url_for('inventory.index') }}" class="btn">Back</a>
</div>

<div class="form-container">
    <form method="POST">
        <div class="form-group">
            <label for="quantity">Current Quantity</label>
            <input type="number" id="quantity" name="quantity" value="{{ item['quantity'] }}" required>
        </div>
        <div class="form-group">
            <label for="reorder_level">Reorder Level</label>
            <input type="number" id="reorder_level" name="reorder_level" value="{{ item['reorder_level'] }}" required>
        </div>
        <button type="submit" class="btn">Save Changes</button>
    </form>
</div>
{% endblock %}
